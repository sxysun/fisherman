[profile.default]
src     = "src"
out     = "out"
libs    = ["lib"]
test    = "test"
script  = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
eth_sepolia  = "${ETH_SEPOLIA_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base_mainnet = "${BASE_MAINNET_RPC_URL}"

[etherscan]
# Etherscan v2 multichain — same key + base url, chainid driven by RPC.
eth_sepolia  = { key = "${BASESCAN_KEY}", chain = 11155111, url = "https://api.etherscan.io/v2/api" }
base_sepolia = { key = "${BASESCAN_KEY}", chain = 84532,    url = "https://api.etherscan.io/v2/api" }
base_mainnet = { key = "${BASESCAN_KEY}", chain = 8453,     url = "https://api.etherscan.io/v2/api" }
