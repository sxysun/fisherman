name: Upgrade fisherman-mirror CVM

# Recurring deploy — upgrades the CVM in place when a new image is
# published. Triggered after docker-publish completes successfully on
# main. Also exposed as workflow_dispatch for manual rollouts.
#
# Behavior:
#   1. Check the on-chain compose_hash; publish if missing (idempotent)
#   2. phala cvms upgrade <vm_uuid> -c docker-compose.phala.yaml
#   3. Wait for /health to come back
#   4. Run the attestation verifier against the new endpoint
#   5. Append to DEPLOYMENTS.md

on:
  workflow_run:
    workflows: ["Publish container image"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-cvm
  cancel-in-progress: false

jobs:
  upgrade:
    name: phala cvms upgrade ${{ vars.CVM_VM_UUID }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions:  write
    env:
      COMPOSE_FILE:  mirror/deploy/docker-compose.phala.yaml
      MIRROR_DOMAIN: ${{ vars.MIRROR_DOMAIN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sanity — required vars
        run: |
          if [[ -z "${{ vars.CVM_VM_UUID }}" || -z "${{ vars.MIRROR_DOMAIN }}" ]]; then
            echo "::error::CVM_VM_UUID + MIRROR_DOMAIN variables required (run bootstrap-cvm first)"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: |
          npm install -g phala
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: phala deploy --cvm-id (in-place upgrade)
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
          CF_API_TOKEN:        ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID:          ${{ vars.CF_ZONE_ID }}
        run: |
          set -euo pipefail
          # The legacy `phala cvms upgrade` wrapper mis-parses -e KEY=VALUE
          # (treats it as an env-file path). The modern `phala deploy
          # --cvm-id <uuid>` does the same in-place upgrade and accepts
          # -e correctly. See `phala deploy --help`.
          #
          # MIRROR_IMAGE_TAG forces a pull of the freshly-built image
          # (compose pins to ${MIRROR_IMAGE_TAG:-latest}); without this,
          # docker reuses the cached :latest and never sees the new code.
          IMAGE_TAG=$(git rev-parse --short HEAD)
          echo "Deploying mirror image tag: $IMAGE_TAG"
          phala deploy \
            --api-token "$PHALA_CLOUD_API_KEY" \
            --cvm-id ${{ vars.CVM_VM_UUID }} \
            -c "$COMPOSE_FILE" \
            -e CF_API_TOKEN="$CF_API_TOKEN" \
            -e CF_ZONE_ID="$CF_ZONE_ID" \
            -e DOMAIN="$MIRROR_DOMAIN" \
            -e MIRROR_IMAGE_TAG="$IMAGE_TAG" \
            --wait

      - name: Read Phala-reported compose_hash AFTER upgrade
        # Crucial that this runs AFTER `phala deploy`, not before — the
        # API returns the currently-running compose, and we need to
        # publish the NEW one on-chain. Reading it pre-upgrade would
        # publish (and re-attest) the previous compose, leaving the new
        # one unauthorized → audit fails.
        id: hash
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          set -euo pipefail
          HASH=$(curl -s "https://cloud-api.phala.com/api/v1/cvms" \
              -H "X-API-Key: $PHALA_CLOUD_API_KEY" \
              | jq -r --arg id "${{ vars.CVM_VM_UUID }}" '.[] | select(.vm_uuid == $id) | .compose_hash' \
              | head -1)
          if [[ -z "$HASH" || "$HASH" == "null" ]]; then
              echo "::error::could not read compose_hash for CVM ${{ vars.CVM_VM_UUID }}"
              exit 1
          fi
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "compose_hash (post-upgrade): 0x$HASH"

      - name: Publish compose_hash on-chain (idempotent)
        env:
          OWNER_PK:             ${{ secrets.OWNER_PK }}
          ETH_SEPOLIA_RPC_URL: ${{ secrets.ETH_SEPOLIA_RPC_URL }}
          CONTRACT:             ${{ vars.FISHERMAN_APP_AUTH_ETH_SEPOLIA }}
        run: |
          set -euo pipefail
          if [[ -z "$CONTRACT" ]]; then
            echo "::warning::FISHERMAN_APP_AUTH_ETH_SEPOLIA not set; skipping on-chain step"
            exit 0
          fi
          ALLOWED=$(cast call "$CONTRACT" 'isAppAllowed(bytes32)(bool)' "0x${{ steps.hash.outputs.hash }}" \
              --rpc-url "$ETH_SEPOLIA_RPC_URL" || echo "false")
          if [[ "$ALLOWED" == "true" ]]; then
            echo "compose_hash already on-chain"
          else
            cast send "$CONTRACT" 'addComposeHash(bytes32)' "0x${{ steps.hash.outputs.hash }}" \
                --rpc-url "$ETH_SEPOLIA_RPC_URL" \
                --private-key "$OWNER_PK"
          fi

      - name: Wait for /health
        run: |
          set -euo pipefail
          DEADLINE=$(( $(date +%s) + 600 ))
          while [[ $(date +%s) -lt $DEADLINE ]]; do
            HTTP=$(curl -sk -o /dev/null -w "%{http_code}" "https://$MIRROR_DOMAIN/health" || true)
            echo "https://$MIRROR_DOMAIN/health → $HTTP"
            if [[ "$HTTP" == "200" ]]; then exit 0; fi
            sleep 10
          done
          echo "::error::ingress never came back up"
          exit 1

      - name: Attestation verifier (full DCAP, on-chain check)
        env:
          ETH_SEPOLIA_RPC_URL:  ${{ secrets.ETH_SEPOLIA_RPC_URL }}
          CONTRACT:             ${{ vars.FISHERMAN_APP_AUTH_ETH_SEPOLIA }}
          MIRROR_DOMAIN:        ${{ vars.MIRROR_DOMAIN }}
        run: |
          python -m pip install --quiet "cryptography>=43.0"
          python <<'PY'
          import os, sys
          sys.path.insert(0, ".")
          from fisherman.attestation import verify_attestation

          res = verify_attestation(
              mirror_url=f"https://{os.environ['MIRROR_DOMAIN']}",
              rpc_url=os.environ.get("ETH_SEPOLIA_RPC_URL") or None,
              contract_address=os.environ.get("CONTRACT") or None,
          )
          print("---- per-row results ----")
          for name, val in [
              ("quote_parsed",          res.quote_parsed_ok),
              ("signature_data_parsed", res.sig_data_parsed_ok),
              ("body_signature",        res.body_sig_ok),
              ("pck_chain",             res.pck_chain_ok),
              ("qe_report",             res.qe_report_ok),
              ("mr_config_id_binding",  res.mr_config_id_binding_ok),
              ("event_log_replay",      res.event_log_replay_ok),
              ("on_chain_allowed",      res.on_chain_allowed),
          ]:
              print(f"  {name:<24} = {val}")
          print(f"errors = {res.errors}")
          print(f"all_required_ok = {res.all_required_ok}")
          if not res.all_required_ok:
              raise SystemExit(
                  f"attestation FAILED — required rows not green. "
                  f"errors={res.errors}"
              )
          PY

      - name: Append to DEPLOYMENTS.md
        run: |
          {
            echo ""
            echo "### $(date -u +%Y-%m-%d) — Upgrade — compose @ \`$(git rev-parse --short HEAD)\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| compose_hash | \`0x${{ steps.hash.outputs.hash }}\` |"
            echo "| VM UUID | \`${{ vars.CVM_VM_UUID }}\` |"
            echo "| Domain | $MIRROR_DOMAIN |"
            echo "| Workflow run | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |"
          } >> mirror/deploy/DEPLOYMENTS.md
          git config user.name  "fisherman-ci"
          git config user.email "ci@fisherman.app"
          git add mirror/deploy/DEPLOYMENTS.md
          git commit -m "deploy: upgrade CVM to compose 0x${{ steps.hash.outputs.hash }} [skip ci]" || true
          git push || true
