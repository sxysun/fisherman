name: Upgrade fisherman-mirror CVM

# Recurring deploy — upgrades the CVM in place when a new image is
# published. Triggered after docker-publish completes successfully on
# main. Also exposed as workflow_dispatch for manual rollouts.
#
# Behavior:
#   1. Check the on-chain compose_hash; publish if missing (idempotent)
#   2. phala cvms upgrade <vm_uuid> -c docker-compose.phala.yaml
#   3. Wait for /health to come back
#   4. Run the attestation verifier against the new endpoint
#   5. Append to DEPLOYMENTS.md

on:
  workflow_run:
    workflows: ["Publish container image"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

concurrency:
  group: deploy-cvm
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upgrade:
    name: phala cvms upgrade ${{ vars.CVM_VM_UUID }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions:  write
      packages: read
    env:
      COMPOSE_FILE:  mirror/deploy/docker-compose.phala.yaml
      MIRROR_DOMAIN: ${{ vars.MIRROR_DOMAIN }}
      RELAY_DOMAIN:  ${{ vars.RELAY_DOMAIN || 'relay.fisherman.teleport.computer' }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Sanity — required vars
        run: |
          if [[ -z "${{ vars.CVM_VM_UUID }}" || -z "${{ vars.MIRROR_DOMAIN }}" ]]; then
            echo "::error::CVM_VM_UUID + MIRROR_DOMAIN variables required (run bootstrap-cvm first)"
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - run: |
          npm install -g phala
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - uses: foundry-rs/foundry-toolchain@v1.8.0
        with:
          version: stable

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: phala deploy --cvm-id (in-place upgrade)
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
          CF_API_TOKEN:        ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID:          ${{ vars.CF_ZONE_ID }}
          CLOUD_DATABASE_URL:  ${{ secrets.FISHERMAN_CLOUD_DATABASE_URL }}
          CLOUD_ENCRYPTION_KEY: ${{ secrets.FISHERMAN_CLOUD_ENCRYPTION_KEY }}
          CLOUD_R2_ACCOUNT_ID: ${{ secrets.FISHERMAN_CLOUD_R2_ACCOUNT_ID }}
          CLOUD_R2_ACCESS_KEY_ID: ${{ secrets.FISHERMAN_CLOUD_R2_ACCESS_KEY_ID }}
          CLOUD_R2_SECRET_ACCESS_KEY: ${{ secrets.FISHERMAN_CLOUD_R2_SECRET_ACCESS_KEY }}
          CLOUD_R2_BUCKET:     ${{ secrets.FISHERMAN_CLOUD_R2_BUCKET }}
          CLOUD_OPENAI_API_KEY: ${{ secrets.FISHERMAN_CLOUD_OPENAI_API_KEY }}
          CLOUD_OPENAI_BASE_URL: ${{ secrets.FISHERMAN_CLOUD_OPENAI_BASE_URL }}
          CLOUD_OPENAI_MODEL:  ${{ vars.FISHERMAN_CLOUD_OPENAI_MODEL }}
          CLOUD_ENROLLMENT_MODE: ${{ vars.FISHERMAN_CLOUD_ENROLLMENT_MODE }}
          CLOUD_ALLOWED_PUBKEYS: ${{ vars.FISHERMAN_CLOUD_ALLOWED_PUBKEYS }}
          CLOUD_MAX_FRAMES_PER_HOUR: ${{ vars.FISHERMAN_CLOUD_MAX_FRAMES_PER_HOUR }}
        run: |
          set -euo pipefail
          # The older `phala cvms upgrade` wrapper mis-parses -e KEY=VALUE
          # (treats it as an env-file path). The modern `phala deploy
          # --cvm-id <uuid>` does the same in-place upgrade and accepts
          # -e correctly. See `phala deploy --help`.
          #
          # Render the image tag into the compose file itself before
          # deploy. dstack's compose_hash covers the rendered compose,
          # not encrypted env vars; keeping MIRROR_IMAGE_TAG in `-e`
          # would let code change while the attested compose_hash stays
          # stable.
          #
          # On workflow_run, deploy the exact commit docker-publish just
          # built. On manual dispatch, fall back to the most recent
          # image-relevant commit that should already have a GHCR tag.
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            IMAGE_COMMIT="${{ github.event.workflow_run.head_sha }}"
            IMAGE_TAG="${IMAGE_COMMIT:0:7}"
          else
            IMAGE_COMMIT=$(git log -1 --pretty=%H -- fisherman mirror relay server pyproject.toml)
            IMAGE_TAG="${IMAGE_COMMIT:0:7}"
          fi
          if [[ -z "$IMAGE_TAG" ]]; then
            echo "::error::no commit touching image-relevant paths found"
            exit 1
          fi
          IMAGE_REPO="ghcr.io/${{ github.repository_owner }}/fisherman-mirror"
          IMAGE_REPO=$(echo "$IMAGE_REPO" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG_REF="$IMAGE_REPO:$IMAGE_TAG"
          echo "Resolving mirror image digest: $IMAGE_TAG_REF"
          IMAGE_DIGEST=$(docker buildx imagetools inspect "$IMAGE_TAG_REF" --format '{{json .}}' | jq -r '.manifest.digest')
          if [[ -z "$IMAGE_DIGEST" || "$IMAGE_DIGEST" == "null" || "$IMAGE_DIGEST" != sha256:* ]]; then
            echo "::error::could not resolve digest for $IMAGE_TAG_REF"
            exit 1
          fi
          IMAGE_REF="$IMAGE_REPO@$IMAGE_DIGEST"
          echo "Deploying mirror image: $IMAGE_REF"
          echo "Image commit: $IMAGE_COMMIT"
          export IMAGE_TAG
          export IMAGE_REF
          export IMAGE_COMMIT
          export IMAGE_DIGEST
          RENDERED_COMPOSE="$RUNNER_TEMP/docker-compose.phala.$IMAGE_TAG.yaml"
          export RENDERED_COMPOSE
          python <<'PY'
          import os
          from pathlib import Path

          src = Path(os.environ["COMPOSE_FILE"]).read_text()
          replacements = {
              "ghcr.io/sxysun/fisherman-mirror:${MIRROR_IMAGE_TAG:-latest}": os.environ["IMAGE_REF"],
              "${FISHERMAN_GIT_COMMIT:-dev}": os.environ["IMAGE_COMMIT"],
              "${FISHERMAN_IMAGE_DIGEST:-sha256:dev}": os.environ["IMAGE_DIGEST"],
          }
          rendered = src
          for needle, value in replacements.items():
              if needle not in rendered:
                  raise SystemExit(f"{needle} not found in compose template")
              rendered = rendered.replace(needle, value)
          Path(os.environ["RENDERED_COMPOSE"]).write_text(rendered)
          PY
          echo "Rendered compose sha256: $(sha256sum "$RENDERED_COMPOSE" | awk '{print $1}')"
          phala deploy \
            --api-token "$PHALA_CLOUD_API_KEY" \
            --cvm-id ${{ vars.CVM_VM_UUID }} \
            -c "$RENDERED_COMPOSE" \
            -e CF_API_TOKEN="$CF_API_TOKEN" \
            -e CF_ZONE_ID="$CF_ZONE_ID" \
            -e DOMAIN="$MIRROR_DOMAIN" \
            -e RELAY_DOMAIN="$RELAY_DOMAIN" \
            -e FISHERMAN_CLOUD_DATABASE_URL="$CLOUD_DATABASE_URL" \
            -e FISHERMAN_CLOUD_ENCRYPTION_KEY="$CLOUD_ENCRYPTION_KEY" \
            -e FISHERMAN_CLOUD_R2_ACCOUNT_ID="$CLOUD_R2_ACCOUNT_ID" \
            -e FISHERMAN_CLOUD_R2_ACCESS_KEY_ID="$CLOUD_R2_ACCESS_KEY_ID" \
            -e FISHERMAN_CLOUD_R2_SECRET_ACCESS_KEY="$CLOUD_R2_SECRET_ACCESS_KEY" \
            -e FISHERMAN_CLOUD_R2_BUCKET="$CLOUD_R2_BUCKET" \
            -e FISHERMAN_CLOUD_OPENAI_API_KEY="$CLOUD_OPENAI_API_KEY" \
            -e FISHERMAN_CLOUD_OPENAI_BASE_URL="$CLOUD_OPENAI_BASE_URL" \
            -e FISHERMAN_CLOUD_OPENAI_MODEL="$CLOUD_OPENAI_MODEL" \
            -e FISHERMAN_CLOUD_ENROLLMENT_MODE="$CLOUD_ENROLLMENT_MODE" \
            -e FISHERMAN_CLOUD_ALLOWED_PUBKEYS="$CLOUD_ALLOWED_PUBKEYS" \
            -e FISHERMAN_CLOUD_DEFAULT_MAX_FRAMES_PER_HOUR="$CLOUD_MAX_FRAMES_PER_HOUR" \
            --wait

      - name: Read Phala-reported compose_hash AFTER upgrade
        # Crucial that this runs AFTER `phala deploy`, not before — the
        # API returns the currently-running compose, and we need to
        # publish the NEW one on-chain. Reading it pre-upgrade would
        # publish (and re-attest) the previous compose, leaving the new
        # one unauthorized → audit fails.
        id: hash
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          set -euo pipefail
          HASH=$(curl -s "https://cloud-api.phala.com/api/v1/cvms" \
              -H "X-API-Key: $PHALA_CLOUD_API_KEY" \
              | jq -r --arg id "${{ vars.CVM_VM_UUID }}" '.[] | select(.vm_uuid == $id) | .compose_hash' \
              | head -1)
          if [[ -z "$HASH" || "$HASH" == "null" ]]; then
              echo "::error::could not read compose_hash for CVM ${{ vars.CVM_VM_UUID }}"
              exit 1
          fi
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "compose_hash (post-upgrade): 0x$HASH"

      - name: Publish compose_hash on-chain (idempotent)
        env:
          OWNER_PK:             ${{ secrets.OWNER_PK }}
          ETH_SEPOLIA_RPC_URL: ${{ secrets.ETH_SEPOLIA_RPC_URL }}
          CONTRACT:             ${{ vars.FISHERMAN_APP_AUTH_ETH_SEPOLIA }}
        run: |
          set -euo pipefail
          HASH="0x${{ steps.hash.outputs.hash }}"
          if [[ -z "$CONTRACT" ]]; then
            echo "::warning::FISHERMAN_APP_AUTH_ETH_SEPOLIA not set; skipping on-chain step"
            exit 0
          fi

          is_allowed() {
            cast call "$CONTRACT" 'isAppAllowed(bytes32)(bool)' "$HASH" \
              --rpc-url "$ETH_SEPOLIA_RPC_URL" || echo "false"
          }

          if [[ "$(is_allowed)" == "true" ]]; then
            echo "compose_hash already on-chain"
            exit 0
          fi

          send_args=(
            "$CONTRACT" 'addComposeHash(bytes32)' "$HASH"
            --rpc-url "$ETH_SEPOLIA_RPC_URL"
            --private-key "$OWNER_PK"
          )
          if cast send "${send_args[@]}"; then
            exit 0
          fi

          # GitHub runs can overlap with a previous AppAuth tx for the
          # same owner. Recheck first; if still not authorized, resend
          # with the latest nonce and a bumped gas price so Sepolia
          # accepts the replacement instead of leaving Cloud in an
          # upgraded-but-unauthorized state.
          sleep 20
          if [[ "$(is_allowed)" == "true" ]]; then
            echo "compose_hash became allowed after initial send"
            exit 0
          fi

          GAS_PRICE=$(cast gas-price --rpc-url "$ETH_SEPOLIA_RPC_URL")
          BUMPED_GAS_PRICE=$(( GAS_PRICE * 2 ))
          echo "resending compose_hash authorization with bumped gas price"
          cast send "${send_args[@]}" --resend --gas-price "$BUMPED_GAS_PRICE"

      - name: Wait for Cloud + relay /health
        run: |
          set -euo pipefail
          DEADLINE=$(( $(date +%s) + 600 ))
          while [[ $(date +%s) -lt $DEADLINE ]]; do
            MIRROR_HTTP=$(curl -sk -o /dev/null -w "%{http_code}" "https://$MIRROR_DOMAIN/health" || true)
            RELAY_HTTP=$(curl -sk -o /dev/null -w "%{http_code}" "https://$RELAY_DOMAIN/health" || true)
            echo "https://$MIRROR_DOMAIN/health → $MIRROR_HTTP"
            echo "https://$RELAY_DOMAIN/health → $RELAY_HTTP"
            if [[ "$MIRROR_HTTP" == "200" && "$RELAY_HTTP" == "200" ]]; then exit 0; fi
            sleep 10
          done
          echo "::error::ingress never came back up for both Cloud and relay"
          exit 1

      - name: Attestation verifier (structural + DCAP)
        env:
          MIRROR_DOMAIN: ${{ vars.MIRROR_DOMAIN }}
        run: |
          python -m pip install --quiet "cryptography>=43.0"
          python <<'PY'
          import os, sys
          sys.path.insert(0, ".")
          from fisherman.attestation import verify_attestation

          # On-chain authorization is already verified by the
          # "Publish compose_hash on-chain (idempotent)" step above —
          # if the new compose_hash isn't allowed, that step fails the
          # cast call and won't publish. Don't duplicate via urllib here:
          # CI's ETH_SEPOLIA_RPC_URL secret needs an auth header that
          # urllib doesn't replicate cleanly, and we'd just race.
          res = verify_attestation(
              mirror_url=f"https://{os.environ['MIRROR_DOMAIN']}",
              rpc_url=None,
              contract_address=None,
          )
          print("---- per-row results ----")
          for name, val in [
              ("quote_parsed",          res.quote_parsed_ok),
              ("signature_data_parsed", res.sig_data_parsed_ok),
              ("body_signature",        res.body_sig_ok),
              ("pck_chain",             res.pck_chain_ok),
              ("qe_report",             res.qe_report_ok),
              ("mr_config_id_binding",  res.mr_config_id_binding_ok),
              ("event_log_replay",      res.event_log_replay_ok),
              ("on_chain_allowed",      res.on_chain_allowed),
          ]:
              print(f"  {name:<24} = {val}")
          print(f"errors = {res.errors}")
          print(f"all_required_ok = {res.all_required_ok}")
          if not res.all_required_ok:
              raise SystemExit(
                  f"attestation FAILED — required rows not green. "
                  f"errors={res.errors}"
              )
          PY

      - name: Append to DEPLOYMENTS.md
        run: |
          {
            echo ""
            echo "### $(date -u +%Y-%m-%d) — Upgrade — compose @ \`$(git rev-parse --short HEAD)\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| compose_hash | \`0x${{ steps.hash.outputs.hash }}\` |"
            echo "| VM UUID | \`${{ vars.CVM_VM_UUID }}\` |"
            echo "| Domain | $MIRROR_DOMAIN |"
            echo "| Relay | $RELAY_DOMAIN |"
            echo "| Workflow run | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |"
          } >> mirror/deploy/DEPLOYMENTS.md
          git config user.name  "fisherman-ci"
          git config user.email "ci@fisherman.app"
          git add mirror/deploy/DEPLOYMENTS.md
          git commit -m "deploy: upgrade CVM to compose 0x${{ steps.hash.outputs.hash }} [skip ci]" || true
          git push || true
