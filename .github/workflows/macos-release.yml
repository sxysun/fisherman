name: macOS DMG Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      unsigned:
        description: "Build an unsigned, unnotarized artifact for testing only"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: macos-release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  dmg:
    name: Build signed DMG
    runs-on: macos-15
    env:
      P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_P12_BASE64 }}
      P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION_CERT_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.APPLE_KEYCHAIN_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_FALLBACK: ${{ secrets.APPLE_ID_FALLBACK || vars.APPLE_ID_FALLBACK }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID || vars.APPLE_TEAM_ID || 'DC9JH5DRMY' }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_APP_SPECIFIC_PASSWORD_FALLBACK: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD_FALLBACK }}
      APPLE_CODESIGN_IDENTITY: ${{ secrets.APPLE_CODESIGN_IDENTITY }}
    steps:
      - uses: actions/checkout@v6

      - name: Decide release mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.unsigned }}" = "true" ]; then
            echo "unsigned=true" >> "$GITHUB_OUTPUT"
          else
            echo "unsigned=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Apple release secrets
        if: steps.mode.outputs.unsigned != 'true'
        run: |
          missing=0
          for name in P12_BASE64 P12_PASSWORD KEYCHAIN_PASSWORD APPLE_ID APPLE_TEAM_ID APPLE_APP_SPECIFIC_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::Missing Apple release secret: $name"
              missing=1
            fi
          done
          exit "$missing"

      - name: Import Developer ID certificate
        if: steps.mode.outputs.unsigned != 'true'
        run: |
          KEYCHAIN="$RUNNER_TEMP/fisherman-signing.keychain-db"
          CERT="$RUNNER_TEMP/developer-id.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          echo "FISHERMAN_SIGNING_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

          if ! printf '%s' "$P12_BASE64" | base64 --decode > "$CERT" 2>/dev/null; then
            printf '%s' "$P12_BASE64" | base64 -D > "$CERT"
          fi
          security import "$CERT" -k "$KEYCHAIN" -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Build DMG
        env:
          SKIP_NOTARIZE: ${{ steps.mode.outputs.unsigned == 'true' && '1' || '0' }}
          CODE_SIGN_IDENTITY: ${{ steps.mode.outputs.unsigned == 'true' && '-' || secrets.APPLE_CODESIGN_IDENTITY }}
          RELEASE_BRANCH: main
          RELEASE_REPO_URL: https://github.com/sxysun/fisherman.git
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if [[ "$TAG" == v* ]]; then
            VERSION="${TAG#v}" ./scripts/build-macos-dmg.sh
          else
            ./scripts/build-macos-dmg.sh
          fi

      - name: Smoke test DMG
        env:
          EXPECT_SIGNED: ${{ steps.mode.outputs.unsigned == 'true' && '0' || '1' }}
        run: |
          ./scripts/smoke-macos-dmg.sh "$(ls dist/macos/Fisherman-*.dmg | head -1)"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: fisherman-macos-dmg
          path: |
            dist/macos/Fisherman-*.dmg
            dist/macos/Fisherman-*.dmg.sha256
            dist/macos/release-notes.md
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          DMG="$(ls dist/macos/Fisherman-*.dmg | head -1)"
          SHA="$DMG.sha256"
          NOTES="dist/macos/release-notes.md"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$DMG" "$SHA" --clobber
          else
            gh release create "$TAG" "$DMG" "$SHA" \
              --title "Fisherman $TAG" \
              --notes-file "$NOTES"
          fi

      - name: Clean up signing keychain
        if: always() && env.FISHERMAN_SIGNING_KEYCHAIN != ''
        run: |
          security delete-keychain "$FISHERMAN_SIGNING_KEYCHAIN" || true
