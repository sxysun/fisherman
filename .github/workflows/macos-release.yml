name: macOS Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos-app:
    runs-on: macos-14

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build Fisherman.app
        shell: bash
        run: |
          set -euo pipefail
          cd menubar
          swift build -c release

          APP=".build/Fisherman.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp .build/release/FishermanMenu "$APP/Contents/MacOS/FishermanMenu"
          cp Info.plist "$APP/Contents/Info.plist"
          cp AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"

          xattr -cr "$APP" 2>/dev/null || true
          find "$APP" -name '._*' -delete 2>/dev/null || true
          find "$APP" -name '.DS_Store' -delete 2>/dev/null || true

          codesign --force --sign - "$APP/Contents/MacOS/FishermanMenu"
          codesign --force --deep --sign - "$APP"

      - name: Package zip and dmg
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME:-manual}-${GITHUB_SHA::7}"
          mkdir -p dist
          cp -R menubar/.build/Fisherman.app dist/Fisherman.app
          ditto -c -k --keepParent dist/Fisherman.app dist/Fisherman-${VERSION}.zip
          hdiutil create -volname "Fisherman" -srcfolder dist/Fisherman.app -ov -format UDZO dist/Fisherman-${VERSION}.dmg

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fisherman-macos-artifacts
          path: |
            dist/Fisherman.app
            dist/*.zip
            dist/*.dmg

      - name: Publish GitHub Release artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.dmg
          generate_release_notes: true
          draft: false
          prerelease: false
