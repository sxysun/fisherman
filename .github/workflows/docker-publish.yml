name: Publish container image

# Builds the fisherman-mirror image deterministically and publishes to
# ghcr.io. Runs on every push to main and on tag pushes.
#
# Required: nothing — uses GITHUB_TOKEN automatically.
# Optional: PHALA_DEPLOY_PAT — a fine-scoped PAT with packages:write
#   for cross-org pulls if you fork into an org.

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "fisherman/**"
      - "mirror/**"
      - "pyproject.toml"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    name: build + push ghcr.io/${{ github.repository_owner }}/fisherman-mirror
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.tags.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
      compose_hash: ${{ steps.compose_hash.outputs.hash }}

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: tags
        run: |
          COMMIT_SHORT=$(git rev-parse --short HEAD)
          IMAGE=ghcr.io/${{ github.repository_owner }}/fisherman-mirror
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "tags=$IMAGE:$COMMIT_SHORT,$IMAGE:latest" >> "$GITHUB_OUTPUT"
          echo "commit_short=$COMMIT_SHORT" >> "$GITHUB_OUTPUT"

      - name: Derive release metadata
        id: meta
        run: |
          echo "git_commit=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v7
        id: build
        with:
          context: .
          file: mirror/deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            FISHERMAN_GIT_COMMIT=${{ steps.meta.outputs.git_commit }}
            FISHERMAN_BUILT_AT=${{ steps.meta.outputs.built_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish digest
        run: |
          echo "Published: ${{ steps.tags.outputs.tags }}"
          echo "Digest: ${{ steps.build.outputs.digest }}"

      - name: Compute compose_hash for Phala compose file
        id: compose_hash
        run: |
          HASH=$(sha256sum mirror/deploy/docker-compose.phala.yaml | awk '{print $1}')
          echo "compose_hash=0x$HASH"
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Make package public so Phala CVMs can pull anonymously
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/users/$OWNER/packages/container/fisherman-mirror" \
            -f visibility=public 2>&1 | tail -3 || \
          gh api --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/orgs/${{ github.repository_owner }}/packages/container/fisherman-mirror" \
            -f visibility=public 2>&1 | tail -3 || \
          echo "(visibility patch failed — set manually in package settings)"

      - name: Summary
        run: |
          {
            echo "## Published"
            echo "- Image: \`${{ steps.tags.outputs.tags }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
            echo "- compose_hash: \`0x${{ steps.compose_hash.outputs.hash }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
