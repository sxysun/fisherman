name: Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/website.yml"
  pull_request:
    paths:
      - "website/**"
      - ".github/workflows/website.yml"
  workflow_dispatch:

concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build website
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install
        run: npm ci
        working-directory: website

      - name: Build
        run: npm run build
        working-directory: website

  deploy-vercel:
    name: Deploy to Vercel
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: vercel-production
      url: https://app.fisherman.teleport.computer
    env:
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install Vercel CLI
        run: npm install --global vercel@53.3.2

      - name: Check Vercel token
        if: ${{ env.VERCEL_TOKEN == '' }}
        run: |
          echo "::warning::Set the VERCEL_TOKEN repository secret to enable production website deploys."

      - name: Pull Vercel project settings
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"
        working-directory: website

      - name: Build
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel build --prod --token "$VERCEL_TOKEN"
        working-directory: website

      - name: Deploy
        if: ${{ env.VERCEL_TOKEN != '' }}
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
        working-directory: website
