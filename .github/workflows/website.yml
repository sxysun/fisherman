name: Website

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/website.yml"
  pull_request:
    paths:
      - "website/**"
      - ".github/workflows/website.yml"
  workflow_dispatch:

concurrency:
  group: website-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build website
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install
        run: npm ci
        working-directory: website

      - name: Build
        run: npm run build
        working-directory: website

      - uses: actions/upload-pages-artifact@v4
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        with:
          path: website/dist

  deploy:
    name: Deploy app.fisherman.teleport.computer
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: https://app.fisherman.teleport.computer
    steps:
      - uses: actions/deploy-pages@v4
