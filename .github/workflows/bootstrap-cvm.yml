name: Bootstrap fisherman-mirror CVM (one-time)

# One-time deploy of the fisherman-mirror Phala TDX CVM. Captures the
# resulting app_id + vm_uuid and stores them as repo variables so the
# recurring deploy-cvm workflow can upgrade in-place.
#
# NOT idempotent — re-running creates a SECOND CVM with the same name.
# Pre-flight guards against this by checking for an existing CVM with
# the configured name; delete the old one manually (`phala cvms delete
# <uuid>`) before re-triggering.
#
# Required secrets:
#   PHALA_CLOUD_API_KEY    Phala Cloud API token (from cloud.phala.com)
#   CF_API_TOKEN           Cloudflare token with Zone.DNS:Edit on your domain
#   CF_ZONE_ID             Cloudflare zone id for fisherman.app (or your domain)
#   OWNER_PK               private key authorized to call addComposeHash()
#   ETH_SEPOLIA_RPC_URL    testnet RPC for the on-chain step
#   FISHERMAN_CLOUD_*      optional managed ingest secrets; if absent,
#                          Cloud /health reports ingest.ready=false
#
# Required variables:
#   FISHERMAN_APP_AUTH_ETH_SEPOLIA   set by contract-deploy workflow
#
# Set BEFORE running:
#   variables.MIRROR_DOMAIN              e.g. fisherman.teleport.computer
#   variables.RELAY_DOMAIN               optional; default relay.fisherman.teleport.computer
#   variables.PHALA_NODE_ID              numeric node id (currently prod9 = "18")
#   variables.PHALA_GATEWAY              dstack-pha-prod9.phala.network

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm you want to spin up a NEW CVM'
        required: true
        default: 'no'

concurrency:
  group: bootstrap-cvm
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  bootstrap:
    name: deploy fisherman-mirror to ${{ vars.PHALA_GATEWAY }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      actions:  write   # for `gh variable set` to persist CVM ids
      packages: read
    env:
      CVM_NAME:     fisherman-mirror
      NODE_ID:      ${{ vars.PHALA_NODE_ID }}
      GATEWAY:      ${{ vars.PHALA_GATEWAY }}
      COMPOSE_FILE: mirror/deploy/docker-compose.phala.yaml
      MIRROR_DOMAIN: ${{ vars.MIRROR_DOMAIN }}
      RELAY_DOMAIN:  ${{ vars.RELAY_DOMAIN || 'relay.fisherman.teleport.computer' }}

    steps:
      - name: Gate on explicit confirmation
        if: ${{ github.event.inputs.confirm != 'yes' }}
        run: |
          echo "::error::confirm must be 'yes'; got '${{ github.event.inputs.confirm }}'"
          exit 1

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install phala CLI + jq + foundry
        run: |
          npm install -g phala
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq curl

      - uses: foundry-rs/foundry-toolchain@v1.8.0
        with:
          version: stable

      # ---------------------------------------------------------------
      # Pre-flight: bail out if a CVM with our name already exists.
      # ---------------------------------------------------------------
      - name: Pre-flight — assert no existing CVM
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          set -euo pipefail
          # Use the raw API directly — phala CLI's `cvms list -j` output
          # format is unstable across versions and missed an orphan once.
          EXISTING=$(curl -s "https://cloud-api.phala.com/api/v1/cvms" \
              -H "X-API-Key: $PHALA_CLOUD_API_KEY" \
              | jq -r --arg n "$CVM_NAME" '.[] | select(.name == $n) | .vm_uuid' \
              | head -1 || true)
          if [[ -n "$EXISTING" ]]; then
            echo "::error::CVM '$CVM_NAME' already exists at vm_uuid=$EXISTING"
            echo "::error::Delete with: phala cvms delete $EXISTING"
            exit 1
          fi
          echo "no existing CVM with name '$CVM_NAME' — clear to deploy"

      - name: phala deploy
        id: deploy
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
          CF_API_TOKEN:        ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID:          ${{ vars.CF_ZONE_ID }}
          CLOUD_DATABASE_URL:  ${{ secrets.FISHERMAN_CLOUD_DATABASE_URL }}
          CLOUD_ENCRYPTION_KEY: ${{ secrets.FISHERMAN_CLOUD_ENCRYPTION_KEY }}
          CLOUD_R2_ACCOUNT_ID: ${{ secrets.FISHERMAN_CLOUD_R2_ACCOUNT_ID }}
          CLOUD_R2_ACCESS_KEY_ID: ${{ secrets.FISHERMAN_CLOUD_R2_ACCESS_KEY_ID }}
          CLOUD_R2_SECRET_ACCESS_KEY: ${{ secrets.FISHERMAN_CLOUD_R2_SECRET_ACCESS_KEY }}
          CLOUD_R2_BUCKET:     ${{ secrets.FISHERMAN_CLOUD_R2_BUCKET }}
          CLOUD_OPENAI_API_KEY: ${{ secrets.FISHERMAN_CLOUD_OPENAI_API_KEY }}
          CLOUD_OPENAI_BASE_URL: ${{ secrets.FISHERMAN_CLOUD_OPENAI_BASE_URL }}
          CLOUD_OPENAI_MODEL:  ${{ vars.FISHERMAN_CLOUD_OPENAI_MODEL }}
          CLOUD_ENROLLMENT_MODE: ${{ vars.FISHERMAN_CLOUD_ENROLLMENT_MODE }}
          CLOUD_ALLOWED_PUBKEYS: ${{ vars.FISHERMAN_CLOUD_ALLOWED_PUBKEYS }}
          CLOUD_MAX_FRAMES_PER_HOUR: ${{ vars.FISHERMAN_CLOUD_MAX_FRAMES_PER_HOUR }}
          CLOUD_EXTERNAL_LLM_ENABLED: ${{ vars.FISHERMAN_CLOUD_EXTERNAL_LLM_ENABLED }}
        run: |
          set -euo pipefail
          IMAGE_REPO="ghcr.io/${{ github.repository_owner }}/fisherman-mirror"
          IMAGE_REPO=$(echo "$IMAGE_REPO" | tr '[:upper:]' '[:lower:]')
          IMAGE_COMMIT=""
          IMAGE_TAG=""
          IMAGE_DIGEST=""
          for candidate in $(git log -20 --pretty=%H -- fisherman mirror relay server pyproject.toml ':(exclude)mirror/deploy/DEPLOYMENTS.md'); do
            candidate_tag="${candidate:0:7}"
            candidate_ref="$IMAGE_REPO:$candidate_tag"
            candidate_digest=$(docker buildx imagetools inspect "$candidate_ref" --format '{{json .}}' 2>/dev/null | jq -r '.manifest.digest // empty' || true)
            if [[ "$candidate_digest" == sha256:* ]]; then
              IMAGE_COMMIT="$candidate"
              IMAGE_TAG="$candidate_tag"
              IMAGE_DIGEST="$candidate_digest"
              break
            fi
          done
          if [[ -z "$IMAGE_TAG" ]]; then
            echo "::error::no published image tag found for recent image-relevant commits"
            exit 1
          fi
          IMAGE_TAG_REF="$IMAGE_REPO:$IMAGE_TAG"
          echo "Resolving mirror image digest: $IMAGE_TAG_REF"
          if [[ -z "$IMAGE_DIGEST" ]]; then
            IMAGE_DIGEST=$(docker buildx imagetools inspect "$IMAGE_TAG_REF" --format '{{json .}}' | jq -r '.manifest.digest')
          fi
          if [[ -z "$IMAGE_DIGEST" || "$IMAGE_DIGEST" == "null" || "$IMAGE_DIGEST" != sha256:* ]]; then
            echo "::error::could not resolve digest for $IMAGE_TAG_REF"
            exit 1
          fi
          IMAGE_REF="$IMAGE_REPO@$IMAGE_DIGEST"
          export IMAGE_TAG
          export IMAGE_REF
          export IMAGE_COMMIT
          export IMAGE_DIGEST
          RENDERED_COMPOSE="$RUNNER_TEMP/docker-compose.phala.$IMAGE_TAG.yaml"
          export RENDERED_COMPOSE
          python <<'PY'
          import os
          from pathlib import Path

          src = Path(os.environ["COMPOSE_FILE"]).read_text()
          replacements = {
              "ghcr.io/sxysun/fisherman-mirror:${MIRROR_IMAGE_TAG:-latest}": os.environ["IMAGE_REF"],
              "${FISHERMAN_GIT_COMMIT:-dev}": os.environ["IMAGE_COMMIT"],
              "${FISHERMAN_IMAGE_DIGEST:-sha256:dev}": os.environ["IMAGE_DIGEST"],
          }
          rendered = src
          for needle, value in replacements.items():
              if needle not in rendered:
                  raise SystemExit(f"{needle} not found in compose template")
              rendered = rendered.replace(needle, value)
          Path(os.environ["RENDERED_COMPOSE"]).write_text(rendered)
          PY
          echo ">>> phala deploy -n $CVM_NAME --node-id $NODE_ID -c $RENDERED_COMPOSE"
          echo "Deploying mirror image: $IMAGE_REF"
          echo "Image commit: $IMAGE_COMMIT"
          echo "Rendered compose sha256: $(sha256sum "$RENDERED_COMPOSE" | awk '{print $1}')"
          phala deploy \
            --api-token "$PHALA_CLOUD_API_KEY" \
            -n "$CVM_NAME" \
            -c "$RENDERED_COMPOSE" \
            --node-id "$NODE_ID" \
            -e CF_API_TOKEN="$CF_API_TOKEN" \
            -e CF_ZONE_ID="$CF_ZONE_ID" \
            -e DOMAIN="$MIRROR_DOMAIN" \
            -e RELAY_DOMAIN="$RELAY_DOMAIN" \
            -e FISHERMAN_CLOUD_DATABASE_URL="$CLOUD_DATABASE_URL" \
            -e FISHERMAN_CLOUD_ENCRYPTION_KEY="$CLOUD_ENCRYPTION_KEY" \
            -e FISHERMAN_CLOUD_R2_ACCOUNT_ID="$CLOUD_R2_ACCOUNT_ID" \
            -e FISHERMAN_CLOUD_R2_ACCESS_KEY_ID="$CLOUD_R2_ACCESS_KEY_ID" \
            -e FISHERMAN_CLOUD_R2_SECRET_ACCESS_KEY="$CLOUD_R2_SECRET_ACCESS_KEY" \
            -e FISHERMAN_CLOUD_R2_BUCKET="$CLOUD_R2_BUCKET" \
            -e FISHERMAN_CLOUD_OPENAI_API_KEY="$CLOUD_OPENAI_API_KEY" \
            -e FISHERMAN_CLOUD_OPENAI_BASE_URL="$CLOUD_OPENAI_BASE_URL" \
            -e FISHERMAN_CLOUD_OPENAI_MODEL="$CLOUD_OPENAI_MODEL" \
            -e FISHERMAN_CLOUD_ENROLLMENT_MODE="$CLOUD_ENROLLMENT_MODE" \
            -e FISHERMAN_CLOUD_ALLOWED_PUBKEYS="$CLOUD_ALLOWED_PUBKEYS" \
            -e FISHERMAN_CLOUD_DEFAULT_MAX_FRAMES_PER_HOUR="$CLOUD_MAX_FRAMES_PER_HOUR" \
            -e FISHERMAN_CLOUD_EXTERNAL_LLM_ENABLED="$CLOUD_EXTERNAL_LLM_ENABLED" \
            --wait -j 2>&1 | tee /tmp/deploy.log

          # Tail of the log is a JSON document — extract app_id + vm_uuid
          JSON=$(tac /tmp/deploy.log | awk '/^}/{p=1} p; /^{/{exit}' | tac)
          APP_ID=$(echo "$JSON" | jq -r '.app_id // .data.app_id // empty')
          VM_UUID=$(echo "$JSON" | jq -r '.vm_uuid // .data.vm_uuid // .uuid // empty')
          if [[ -z "$APP_ID" || -z "$VM_UUID" ]]; then
            echo "::error::failed to extract app_id/vm_uuid from phala deploy output"
            exit 1
          fi
          echo "app_id=$APP_ID"   >> "$GITHUB_OUTPUT"
          echo "vm_uuid=$VM_UUID" >> "$GITHUB_OUTPUT"

      - name: Wait for Cloud + relay ingress
        run: |
          set -euo pipefail
          DEADLINE=$(( $(date +%s) + 600 ))   # 10 min
          while [[ $(date +%s) -lt $DEADLINE ]]; do
            MIRROR_HTTP=$(curl -sk -o /dev/null -w "%{http_code}" "https://$MIRROR_DOMAIN/health" || true)
            RELAY_HTTP=$(curl -sk -o /dev/null -w "%{http_code}" "https://$RELAY_DOMAIN/health" || true)
            echo "  https://$MIRROR_DOMAIN/health → $MIRROR_HTTP"
            echo "  https://$RELAY_DOMAIN/health → $RELAY_HTTP"
            if [[ "$MIRROR_HTTP" == "200" && "$RELAY_HTTP" == "200" ]]; then exit 0; fi
            sleep 15
          done
          echo "::error::ingress never came up for both Cloud and relay"
          exit 1

      - name: Compute compose_hash + publish on-chain
        env:
          PHALA_CLOUD_API_KEY:  ${{ secrets.PHALA_CLOUD_API_KEY }}
          OWNER_PK:             ${{ secrets.OWNER_PK }}
          ETH_SEPOLIA_RPC_URL:  ${{ secrets.ETH_SEPOLIA_RPC_URL }}
          CONTRACT:             ${{ vars.FISHERMAN_APP_AUTH_ETH_SEPOLIA }}
        run: |
          set -euo pipefail
          if [[ -z "$CONTRACT" ]]; then
            echo "::warning::FISHERMAN_APP_AUTH_ETH_SEPOLIA variable not set; skipping on-chain step"
            exit 0
          fi
          # Use the compose_hash dstack actually computed (normalized YAML +
          # env substitution) — sha256 of the raw file would diverge.
          HASH=$(curl -s "https://cloud-api.phala.com/api/v1/cvms" \
              -H "X-API-Key: $PHALA_CLOUD_API_KEY" \
              | jq -r --arg n "$CVM_NAME" '.[] | select(.name == $n) | .compose_hash' \
              | head -1)
          if [[ -z "$HASH" || "$HASH" == "null" ]]; then
              echo "::error::could not read compose_hash from Phala API"
              exit 1
          fi
          echo "compose_hash (Phala-reported): 0x$HASH"

          COMPOSE_HASH="0x$HASH"
          is_allowed() {
            cast call "$CONTRACT" 'isAppAllowed(bytes32)(bool)' "$COMPOSE_HASH" \
              --rpc-url "$ETH_SEPOLIA_RPC_URL" || echo "false"
          }

          if [[ "$(is_allowed)" == "true" ]]; then
            echo "compose_hash already on-chain — skipping addComposeHash()"
            exit 0
          fi

          send_args=(
            "$CONTRACT" 'addComposeHash(bytes32)' "$COMPOSE_HASH"
            --rpc-url "$ETH_SEPOLIA_RPC_URL"
            --private-key "$OWNER_PK"
          )
          if cast send "${send_args[@]}"; then
            exit 0
          fi

          sleep 20
          if [[ "$(is_allowed)" == "true" ]]; then
            echo "compose_hash became allowed after initial send"
            exit 0
          fi

          GAS_PRICE=$(cast gas-price --rpc-url "$ETH_SEPOLIA_RPC_URL")
          BUMPED_GAS_PRICE=$(( GAS_PRICE * 2 ))
          echo "resending compose_hash authorization with bumped gas price"
          cast send "${send_args[@]}" --resend --gas-price "$BUMPED_GAS_PRICE"

      - name: Persist CVM ids as variables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh variable set CVM_APP_ID  --body "${{ steps.deploy.outputs.app_id }}"
          gh variable set CVM_VM_UUID --body "${{ steps.deploy.outputs.vm_uuid }}"

      - name: Append to DEPLOYMENTS.md
        run: |
          {
            echo ""
            echo "### $(date -u +%Y-%m-%d) — fisherman-mirror CVM ($GATEWAY)"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Provider | Phala Cloud |"
            echo "| Node | $GATEWAY (id: $NODE_ID) |"
            echo "| Name | $CVM_NAME |"
            echo "| App ID | \`${{ steps.deploy.outputs.app_id }}\` |"
            echo "| VM UUID | \`${{ steps.deploy.outputs.vm_uuid }}\` |"
            echo "| Compose | \`$COMPOSE_FILE\` @ \`$(git rev-parse --short HEAD)\` |"
            echo "| Domain | $MIRROR_DOMAIN |"
            echo "| Relay | $RELAY_DOMAIN |"
            echo "| Workflow run | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |"
          } >> mirror/deploy/DEPLOYMENTS.md
          git config user.name  "fisherman-ci"
          git config user.email "ci@fisherman.app"
          git add mirror/deploy/DEPLOYMENTS.md
          git commit -m "deploy: bootstrap fisherman-mirror CVM (app_id ${{ steps.deploy.outputs.app_id }}) [skip ci]" || true
          git push || true

      - name: Summary
        run: |
          {
            echo "## CVM bootstrapped"
            echo "- App ID: \`${{ steps.deploy.outputs.app_id }}\`"
            echo "- VM UUID: \`${{ steps.deploy.outputs.vm_uuid }}\`"
            echo "- Domain: https://$MIRROR_DOMAIN"
            echo "- Relay: https://$RELAY_DOMAIN"
            echo "- Dashboard: https://cloud.phala.com/dashboard/cvms/${{ steps.deploy.outputs.vm_uuid }}"
          } >> "$GITHUB_STEP_SUMMARY"
