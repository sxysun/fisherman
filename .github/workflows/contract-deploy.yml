name: Deploy FishermanAppAuth

# One-time deploy of the FishermanAppAuth contract to a chain.
# After this runs, set the GH variable FISHERMAN_APP_AUTH to the deployed
# address — subsequent workflows (deploy-cvm, attestation-monitor) read it.
#
# Required secrets:
#   OWNER_PK              private key of the deploy wallet (32-byte hex, no 0x)
#   BASE_SEPOLIA_RPC_URL  testnet RPC (e.g. https://sepolia.base.org)
#   BASE_MAINNET_RPC_URL  mainnet RPC (only used when chain=base_mainnet)
#   BASESCAN_KEY          (optional) for source verification

on:
  workflow_dispatch:
    inputs:
      chain:
        description: 'eth_sepolia | base_sepolia | base_mainnet'
        required: true
        default: 'eth_sepolia'
      verify:
        description: 'Run forge verify-contract after deploy'
        required: false
        default: 'true'

concurrency:
  group: contract-deploy-${{ inputs.chain }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: forge script Deploy.s.sol → ${{ inputs.chain }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write   # for DEPLOYMENTS.md update
      actions:  write   # for `gh variable set`
    env:
      OWNER_PK:             ${{ secrets.OWNER_PK }}
      ETH_SEPOLIA_RPC_URL:  ${{ secrets.ETH_SEPOLIA_RPC_URL }}
      BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
      BASE_MAINNET_RPC_URL: ${{ secrets.BASE_MAINNET_RPC_URL }}
      BASESCAN_KEY:         ${{ secrets.BASESCAN_KEY }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install foundry
        uses: foundry-rs/foundry-toolchain@v1.8.0
        with:
          version: stable

      - name: Install forge-std (vendored, no submodule)
        run: |
          cd contracts
          mkdir -p lib
          if [ ! -d lib/forge-std ]; then
              git clone --depth 1 https://github.com/foundry-rs/forge-std lib/forge-std
          fi

      - name: Run unit tests first
        run: |
          cd contracts
          forge test -vvv

      - name: Deploy
        id: deploy
        run: |
          cd contracts
          set -o pipefail
          # Stream forge output to BOTH the CI log and a file we can grep.
          forge script script/Deploy.s.sol \
              --rpc-url ${{ inputs.chain }} \
              --broadcast \
              --slow \
              -vvvv 2>&1 | tee /tmp/forge.log
          # Extract deployed address — the contract logs "FishermanAppAuth deployed at 0x…"
          ADDR=$(grep -oE 'FishermanAppAuth deployed at 0x[a-fA-F0-9]+' /tmp/forge.log | head -1 | awk '{print $NF}')
          if [[ -z "$ADDR" ]]; then
              # Fallback: parse the broadcast file which always contains the address
              BROADCAST_FILE=$(ls -t broadcast/Deploy.s.sol/*/run-latest.json 2>/dev/null | head -1 || true)
              if [[ -n "$BROADCAST_FILE" ]]; then
                  ADDR=$(jq -r '.transactions[] | select(.contractName=="FishermanAppAuth") | .contractAddress' "$BROADCAST_FILE" | head -1)
              fi
          fi
          if [[ -z "$ADDR" ]]; then
              echo "::error::could not parse deployed address from forge output or broadcast files"
              ls -la broadcast/ 2>&1 || echo "(no broadcast/ dir)"
              exit 1
          fi
          echo "address=$ADDR" >> "$GITHUB_OUTPUT"
          echo "Deployed at: $ADDR"

      - name: Verify on Basescan
        if: ${{ inputs.verify == 'true' && env.BASESCAN_KEY != '' }}
        run: |
          cd contracts
          forge verify-contract \
            --chain ${{ inputs.chain }} \
            --etherscan-api-key "$BASESCAN_KEY" \
            ${{ steps.deploy.outputs.address }} \
            src/FishermanAppAuth.sol:FishermanAppAuth \
            --watch || echo "(verify failed; you can retry manually)"

      - name: Persist address as a GitHub Variable
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEY=FISHERMAN_APP_AUTH_$(echo "${{ inputs.chain }}" | tr '[:lower:]' '[:upper:]')
          gh variable set "$KEY" --body "${{ steps.deploy.outputs.address }}" || \
              gh variable set "$KEY" --body "${{ steps.deploy.outputs.address }}" --repo "${{ github.repository }}"

      - name: Append to DEPLOYMENTS.md
        run: |
          {
            echo ""
            echo "### $(date -u +%Y-%m-%d) — FishermanAppAuth on ${{ inputs.chain }}"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| Chain | ${{ inputs.chain }} |"
            echo "| Address | \`${{ steps.deploy.outputs.address }}\` |"
            echo "| Deployer | (OWNER_PK secret) |"
            echo "| Workflow run | https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }} |"
          } >> mirror/deploy/DEPLOYMENTS.md
          git config user.name  "fisherman-ci"
          git config user.email "ci@fisherman.app"
          git add mirror/deploy/DEPLOYMENTS.md
          git commit -m "deploy: FishermanAppAuth on ${{ inputs.chain }} at ${{ steps.deploy.outputs.address }}" || true
          git push || true

      - name: Summary
        run: |
          {
            echo "## FishermanAppAuth deployed"
            echo "- Chain: \`${{ inputs.chain }}\`"
            echo "- Address: \`${{ steps.deploy.outputs.address }}\`"
            echo "- Variable: \`FISHERMAN_APP_AUTH_$(echo '${{ inputs.chain }}' | tr '[:lower:]' '[:upper:]')\`"
          } >> "$GITHUB_STEP_SUMMARY"
