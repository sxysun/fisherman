name: Bug report
description: Report a Fisherman bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Context home
      options:
        - Local Only
        - Fisherman Cloud
        - Self-hosted
        - Friend relay
        - Menu bar app
        - Other
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics
      description: Paste `fisherman doctor` output after redacting secrets.
      render: text
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I did not include private keys, API keys, real context archives, transcripts, or screenshots.
          required: true
