name: Feature request
description: Suggest a product or developer feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Fisherman do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Local Only
        - Fisherman Cloud
        - Self-hosted
        - Friend status
        - Agent Access
        - Settings/menu bar
        - Documentation
        - Other
  - type: textarea
    id: privacy
    attributes:
      label: Privacy and security impact
      description: What raw context, tenant data, friend status, or secrets would this touch?
