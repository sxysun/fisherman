# fisherman-mirror — Phala TDX CVM compose.
#
# Two services:
#   - ingress: TLS termination for mirror.fisherman.app inside the CVM,
#              private key never leaves; LE certs via CF DNS-01.
#   - mirror:  fisherman-mirror serve, reads dstack-KMS-provisioned
#              secrets at /etc/secrets/* (mounted by dstack at boot).
#
# IMPORTANT: every literal in this file enters the compose_hash that
# we publish on-chain via FishermanAppAuth.addComposeHash(). Cosmetic
# env vars (commit SHA, build time) are explicitly category (A) and
# never security-relevant. See deploy/BUILD.md.

name: fisherman-mirror

services:
  # --- TLS termination + LE for mirror.fisherman.app ---
  ingress:
    image: dstacktee/dstack-ingress:2.2@sha256:d05a7b343c37c1cca1bba8dbf7e8f3c6d2118158af2d41c455103796db4f67f0
    restart: unless-stopped
    ports:
      - "443:443"
    environment:
      - DOMAIN=mirror.fisherman.app
      - CF_API_TOKEN=${CF_API_TOKEN}
      - CF_ZONE_ID=${CF_ZONE_ID}
      - LE_EMAIL=admin@fisherman.app
      - UPSTREAM_HOST=mirror
      - UPSTREAM_PORT=5001
    volumes:
      - letsencrypt:/data/letsencrypt
      - ingress-state:/data/state

  # --- fisherman-mirror endpoint ---
  mirror:
    image: ghcr.io/sxysun/fisherman-mirror:${FISHERMAN_IMAGE_TAG}@${FISHERMAN_IMAGE_DIGEST}
    restart: unless-stopped
    environment:
      - FISHERMAN_DATA_DIR=/data
      # dstack-KMS mounts these at boot via /etc/secrets/<name>; we
      # symlink them into the mirror's expected env-var contract in
      # the entrypoint via a small wrapper (mirror/deploy/entrypoint.sh).
      - DSTACK_KMS_PATH=/etc/secrets
    volumes:
      - mirror-data:/data
      - dstack-secrets:/etc/secrets:ro
    expose:
      - "5001"
      - "5003"

volumes:
  mirror-data:
  letsencrypt:
  ingress-state:
  dstack-secrets:
    external: true
    name: dstack_secrets
