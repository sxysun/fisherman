# fisherman-mirror — Phala TDX CVM compose.
#
# Six services:
#   - ingress: dstack-ingress 2.2 — TLS termination + LE certs via CF
#              DNS-01 inside the CVM. Reads CLOUDFLARE_API_TOKEN over
#              the encrypted env channel (`phala deploy -e CF_API_TOKEN=...`).
#              Mounts /var/run/tappd.sock so it can pin the TLS cert
#              fingerprint into the TDX quote's REPORT_DATA.
#   - cloud:   public Fisherman Cloud gateway. /health reports capability
#              readiness; /.well-known/attestation, /ingest, and /api/*
#              are proxied to the internal attested services.
#   - mirror:  fisherman-mirror — runs unpaired-mode by default (only
#              /health + /.well-known/attestation). Pairing happens via
#              menubar after the CVM is up; that step provisions the
#              MIRROR_USER_PUBKEY / MIRROR_USER_X25519_PRIV / MIRROR_BLOB_KEY
#              env vars and the container restarts into paired mode.
#   - relay:   fisherman-relay — official low-trust relay for friend
#              status and deputy RPC routing. It persists only signed
#              ciphertext, never raw context or plaintext status.
#   - postgres: local persistent Postgres for managed Cloud ingest. This
#              keeps the alpha Cloud self-contained inside the attested CVM.
#   - cloud-ingest: multi-tenant raw-context ingest. It uses local Postgres
#              by default, generates/persists its Fernet key under /data if
#              no encrypted env key is injected, and stores encrypted frames
#              on the CVM volume unless R2 credentials are supplied.
#
# IMPORTANT: every literal in the rendered compose enters the
# compose_hash that we publish on-chain via
# FishermanAppAuth.addComposeHash(). CI replaces the GHCR image
# placeholder with the exact per-release digest before `phala deploy`
# so code rollouts produce a new attested compose_hash.
# CI also renders that image by immutable digest and writes the digest
# into the attested runtime metadata exposed by /.well-known/attestation.
# Cosmetic build env vars (commit SHA, build time) are explicitly
# category (A) and never security-relevant. See deploy/BUILD.md.

name: fisherman-mirror

services:
  ingress:
    image: dstacktee/dstack-ingress:2.2@sha256:d05a7b343c37c1cca1bba8dbf7e8f3c6d2118158af2d41c455103796db4f67f0
    restart: unless-stopped
    ports:
      - "443:443"
    environment:
      DNS_PROVIDER: "cloudflare"
      GATEWAY_DOMAIN: "_.dstack-pha-prod9.phala.network"
      SET_CAA: "true"
      CERTBOT_EMAIL: "admin@teleport.computer"
      # SNI-routed Cloud endpoint + official status relay.
      DOMAINS: |
        ${DOMAIN:-fisherman.teleport.computer}
        ${RELAY_DOMAIN:-relay.fisherman.teleport.computer}
      ROUTING_MAP: |
        ${DOMAIN:-fisherman.teleport.computer}=cloud:5000
        ${RELAY_DOMAIN:-relay.fisherman.teleport.computer}=relay:9100
      # CLOUDFLARE_API_TOKEN must be injected via `phala deploy -e CF_API_TOKEN=...`
      # (encrypted env channel — NOT baked into compose_hash). Required
      # scope: Zone.DNS:Edit on the teleport.computer zone (for DNS-01
      # challenge + _dstack-app-address TXT + CAA pinning).
      CLOUDFLARE_API_TOKEN: "${CF_API_TOKEN}"
    volumes:
      - /var/run/tappd.sock:/var/run/tappd.sock
      - fisherman_ingress_letsencrypt:/etc/letsencrypt
      - fisherman_ingress_evidences:/evidences
    depends_on:
      cloud:
        condition: service_started
      relay:
        condition: service_started

  cloud:
    image: ghcr.io/sxysun/fisherman-mirror:${MIRROR_IMAGE_TAG:-latest}
    restart: unless-stopped
    command:
      - python
      - -u
      - -m
      - mirror.cloud_gateway
    environment:
      - CLOUD_HOST=0.0.0.0
      - CLOUD_PORT=5000
      - CLOUD_PUBLIC_URL=https://${DOMAIN:-fisherman.teleport.computer}
      - CLOUD_RELAY_URL=https://${RELAY_DOMAIN:-relay.fisherman.teleport.computer}
      - CLOUD_MIRROR_URL=http://mirror:5001
      - CLOUD_RELAY_HEALTH_URL=http://relay:9100
      - CLOUD_INGEST_HTTP_URL=http://cloud-ingest:9998
      - CLOUD_INGEST_WS_URL=ws://cloud-ingest:9999/ingest
    expose:
      - "5000"
    depends_on:
      mirror:
        condition: service_started
      relay:
        condition: service_started
      cloud-ingest:
        condition: service_started

  postgres:
    image: postgres:16-alpine@sha256:4e6e670bb069649261c9c18031f0aded7bb249a5b6664ddec29c013a89310d50
    restart: unless-stopped
    environment:
      - POSTGRES_DB=fisherman
      - POSTGRES_USER=fisherman
      # Internal-only database on the CVM Docker network. No ingress route
      # exposes 5432. For production billing/accounting we can swap this for
      # an injected password or managed database without changing clients.
      - POSTGRES_HOST_AUTH_METHOD=trust
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - cloud-postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fisherman -d fisherman"]
      interval: 5s
      timeout: 3s
      retries: 20

  mirror:
    # CI renders this placeholder to a literal per-commit image tag
    # before `phala deploy`; the rendered tag is part of the attested
    # compose_hash. Defaults to `:latest` only for local dev.
    image: ghcr.io/sxysun/fisherman-mirror:${MIRROR_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      - FISHERMAN_DATA_DIR=/data
      - FISHERMAN_TLS_DOMAIN=${DOMAIN:-fisherman.teleport.computer}
      - FISHERMAN_GIT_COMMIT=${FISHERMAN_GIT_COMMIT:-dev}
      - FISHERMAN_IMAGE_DIGEST=${FISHERMAN_IMAGE_DIGEST:-sha256:dev}
    volumes:
      - mirror-data:/data
      # tappd.sock — dstack TEE-side API. The mirror reads:
      #   Tappd.Info  → compose_hash, mr_config_id, mrtd, rtmr0..3, event log
      #   Tappd.TdxQuote → live TDX quote bound to (mirror_pubkey ‖ tls_fp)
      # so /.well-known/attestation can be verified end-to-end.
      - /var/run/tappd.sock:/var/run/tappd.sock
      # Same LE volume as ingress. The mirror reads the leaf cert and
      # hashes it into REPORT_DATA so clients can verify that TLS
      # terminates inside this attested CVM.
      - fisherman_ingress_letsencrypt:/etc/letsencrypt:ro
      # Shared evidences volume — dstack-ingress drops the LE cert
      # fingerprint here when it provisions the cert; mirror reads it
      # to bind the TLS pin into REPORT_DATA. Read-only is enough.
      - fisherman_ingress_evidences:/evidences:ro
    expose:
      - "5001"

  cloud-ingest:
    image: ghcr.io/sxysun/fisherman-mirror:${MIRROR_IMAGE_TAG:-latest}
    restart: unless-stopped
    working_dir: /app/server
    command:
      - python
      - -u
      - cloud_ingest.py
    environment:
      - INGEST_HOST=0.0.0.0
      - INGEST_PORT=9999
      - HTTP_API_PORT=9998
      - FISH_MULTI_TENANT=1
      - FISH_CLOUD_ENROLLMENT_MODE=${FISHERMAN_CLOUD_ENROLLMENT_MODE:-closed}
      - FISH_CLOUD_ALLOWED_PUBKEYS=${FISHERMAN_CLOUD_ALLOWED_PUBKEYS:-}
      - FISH_CLOUD_DEFAULT_MAX_FRAMES_PER_HOUR=${FISHERMAN_CLOUD_DEFAULT_MAX_FRAMES_PER_HOUR:-1200}
      - FISH_CLOUD_EXTERNAL_LLM_ENABLED=${FISHERMAN_CLOUD_EXTERNAL_LLM_ENABLED:-0}
      - FISH_CLOUD_MAX_WS_MESSAGE_BYTES=${FISHERMAN_CLOUD_MAX_WS_MESSAGE_BYTES:-16777216}
      - FISH_CLOUD_MAX_IMAGE_BYTES=${FISHERMAN_CLOUD_MAX_IMAGE_BYTES:-8388608}
      - FISHERMAN_FRAMES_DIR=/data/frames
      - FISHERMAN_CLOUD_ENCRYPTION_KEY_FILE=/data/secrets/encryption.key
      - DATABASE_URL=${FISHERMAN_CLOUD_DATABASE_URL:-postgresql://fisherman@postgres:5432/fisherman}
      - ENCRYPTION_KEY=${FISHERMAN_CLOUD_ENCRYPTION_KEY:-}
      - R2_ACCOUNT_ID=${FISHERMAN_CLOUD_R2_ACCOUNT_ID:-}
      - R2_ACCESS_KEY_ID=${FISHERMAN_CLOUD_R2_ACCESS_KEY_ID:-}
      - R2_SECRET_ACCESS_KEY=${FISHERMAN_CLOUD_R2_SECRET_ACCESS_KEY:-}
      - R2_BUCKET=${FISHERMAN_CLOUD_R2_BUCKET:-fisherman}
      - OPENAI_API_KEY=${FISHERMAN_CLOUD_OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${FISHERMAN_CLOUD_OPENAI_BASE_URL:-}
      - OPENAI_MODEL=${FISHERMAN_CLOUD_OPENAI_MODEL:-gpt-4o-mini}
    volumes:
      - cloud-ingest-data:/data
    expose:
      - "9998"
      - "9999"
    depends_on:
      postgres:
        condition: service_healthy

  relay:
    image: ghcr.io/sxysun/fisherman-mirror:${MIRROR_IMAGE_TAG:-latest}
    restart: unless-stopped
    command:
      - python
      - -u
      - -m
      - relay.server
      - --port
      - "9100"
      - --db-path
      - /data/relay/events.sqlite
    environment:
      - RELAY_HOST=0.0.0.0
      - RELAY_PORT=9100
      - RELAY_DB_PATH=/data/relay/events.sqlite
    volumes:
      - relay-data:/data
    expose:
      - "9100"

volumes:
  mirror-data:
  cloud-ingest-data:
  cloud-postgres-data:
  relay-data:
  fisherman_ingress_letsencrypt:
  fisherman_ingress_evidences:
