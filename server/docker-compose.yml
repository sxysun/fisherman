# Ingest server only — Postgres runs on the host (setup.sh installs it).
# This avoids data split between Docker and host databases.
services:
  server:
    build: .
    ports:
      - "9999:9999"
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DATABASE_URL: postgresql://fisherman:fisherman@host.docker.internal:5432/fisherman
    restart: unless-stopped
